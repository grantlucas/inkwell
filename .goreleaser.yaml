# GoReleaser config for Inkwell.
#
# Triggered by .github/workflows/release.yml on `release: published`. Uploads
# linux arm64 / armv7 / armv6 tarballs (binary + inkwell.example.yaml +
# README.md) and a checksums file to the existing GitHub release. Asset names
# omit the version on purpose — docs/guides/installation.md uses the
# releases/latest/download/inkwell-linux-${ARCH}.tar.gz URL pattern.

version: 2

project_name: inkwell

builds:
  - id: inkwell
    main: ./cmd/inkwell
    binary: inkwell
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=hardware
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - arm64
      - arm
    goarm:
      - "6"
      - "7"

archives:
  - id: default
    ids:
      - inkwell
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ if eq .Arch "arm" }}armv{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - inkwell.example.yaml

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: grantlucas
    name: inkwell
  # Release already exists (created as a draft by on-pull-request-close.yml and
  # published manually). keep-existing preserves the auto-generated release
  # notes — we only want to attach build artifacts.
  mode: keep-existing

# Release notes are generated by on-pull-request-close.yml via the GitHub API
# (generate_release_notes: true). Disable GoReleaser's changelog so it doesn't
# fight with the existing body.
changelog:
  disable: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"
