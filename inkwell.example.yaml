display: waveshare_7in5_v2
backend: preview
color_mode: gray4  # 4-level grayscale (recommended). Set to "bw" for
#                  # 1-bit black/white. Both paths use the same threshold
#                  # rendering; gray4 keeps soft accents like precip-bar
#                  # interiors visible as dark gray, BW collapses them to
#                  # solid black. Gray4 trade-offs: slower refresh, no
#                  # partial refresh, larger framebuffer.
# clear_on_shutdown: true  # default; clears the panel to white on
#                          # graceful shutdown (SIGINT/SIGTERM) before
#                          # sleeping the controller. Set to false to
#                          # keep the last frame visible — useful for
#                          # post-mortem debugging of a render bug.
# refresh:                 # how often the panel flashes. Values are counts of
#   full_every: 60         # render CYCLES, not seconds/minutes: wall-clock time
#   fast_every: 10         # = value x render interval (60s by default). So at
#                          # the defaults, full_every: 60 ~= 1 hour and
#                          # fast_every: 10 ~= 10 minutes.
#                          #
#                          # full_every: cycles between full refreshes (the
#                          # multi-flash that clears ghosting; in gray4 this is
#                          # the periodic forced grayscale refresh). Runs on the
#                          # first cycle too. Lower = cleaner contrast, more
#                          # frequent flashing.
#                          # fast_every: cycles between fast refreshes (single
#                          # flicker, bw only). 0 disables fast refreshes.
#                          #
#                          # In bw mode the loop cycles full -> fast -> partial
#                          # so routine ticks stay flicker-free; gray4 has no
#                          # flicker-free waveform and only skips refreshing
#                          # when the frame is unchanged.
#                          # See docs/tech-specs/08-refresh-strategy.md.
preview:
  port: 8080

dashboard:
  # Each widget may set a top-level `refresh:` controlling how often it is
  # allowed to refresh the panel. Cadences are whole minutes (1m floor) and
  # wall-clock aligned, so widgets sharing a cadence coalesce onto the same
  # mark (e.g. two `5m` widgets both refresh on :00/:05/:10) instead of each
  # flashing independently. When unset, the widget's built-in cadence is used
  # (clock 1m, date daily, separator never, weekly-calendar = its data
  # refresh). NOTE: this top-level `refresh` (screen-refresh cadence) is
  # distinct from weekly-calendar's `config.refresh` (data cache TTL) below.
  screens:
    - name: weekly
      widgets:
        - type: date
          bounds: [0, 0, 800, 50]
          config:
            format: "Monday, January 2"
        - type: clock
          bounds: [700, 0, 800, 50]
          # refresh: "5m"   # e.g. update the clock only every 5 minutes
          config:
            format: "15:04"
            align: right
        - type: separator
          bounds: [0, 50, 800, 52]
        - type: weekly-calendar
          bounds: [0, 52, 800, 480]
          config:
            feeds:
              - "https://example.com/my-calendar.ics"
            latitude: 40.7128
            longitude: -74.0060
            temp_unit: C
            show_weather: true
            show_weather_label: true
            max_events: 5
